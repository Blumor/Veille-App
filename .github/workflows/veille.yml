name: Veille automatique

# Génère les rapports et les commit dans le dépôt (data/reports/), sans machine allumée.
# Génération 100 % gratuite (RSS + NVD + KEV + …) : AUCUN secret ni clé API requis ici.
#
# DÉCLENCHEMENT à heure fixe (≈ 6h Paris) : assuré par un service cron externe gratuit
# (cron-job.org, fuseau Europe/Paris) qui appelle l'API GitHub `workflow_dispatch` avec
# { "inputs": { "type": "auto" } }. Le token de ce service vit CHEZ LE SERVICE EXTERNE,
# jamais dans ce dépôt public. (Le cron natif GitHub est volontairement retiré : il est
# best-effort et livrait systématiquement ~3 h en retard.)
#
# type = auto  → logique CUMULATIVE : quotidien chaque jour, + hebdo le lundi,
#                + mensuel le 1er du mois. (daily/weekly/monthly = un seul type, à la main.)

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Type de rapport (auto = quotidien + hebdo le lundi + mensuel le 1er)'
        required: true
        default: auto
        type: choice
        options: [auto, daily, weekly, monthly]

permissions:
  contents: write            # autorise le push des rapports générés (GITHUB_TOKEN runtime)

concurrency:
  group: veille-auto
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Générer le(s) rapport(s)
        run: |
          set -e
          TYPE="${{ github.event.inputs.type }}"
          if [ -n "$TYPE" ] && [ "$TYPE" != "auto" ]; then
            # Type explicite demandé à la main.
            node src/index.js "$TYPE"
          else
            # auto : journalier chaque jour, + hebdo le lundi, + mensuel le 1er.
            node src/index.js daily
            if [ "$(date -u +%u)" = "1" ]; then
              echo "Lundi → génération du rapport hebdomadaire"
              node src/index.js weekly
            fi
            if [ "$(date -u +%d)" = "01" ]; then
              echo "1er du mois → génération du rapport mensuel"
              node src/index.js monthly
            fi
          fi

      - name: Commiter les rapports
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add data/reports
          if git diff --cached --quiet; then
            echo "Aucun nouveau rapport à committer."
          else
            git commit -m "Veille auto — $(date -u +%Y-%m-%d)"
            git push
          fi
