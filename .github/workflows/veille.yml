name: Veille automatique

# Génère les rapports sans aucune machine allumée : GitHub exécute le cron,
# puis les rapports sont commités dans le dépôt (data/reports/).
# Génération 100 % gratuite (RSS + NVD + CISA KEV) : AUCUN secret ni clé API requis.
#
# Logique CUMULATIVE : le rapport journalier est généré CHAQUE jour ; le lundi on
# ajoute l'hebdomadaire ; le 1er du mois on ajoute le mensuel (jamais à la place).
#
# Horaire : un seul cron quotidien à 04h07 UTC ≈ 06h07 Paris l'été / 05h07 l'hiver.
# La minute non-ronde (07) évite les créneaux les plus encombrés de GitHub (minute 0),
# qui subissent les pires retards — le cron GitHub reste « best-effort » (jamais à la
# seconde près). GitHub ne planifie qu'en UTC, sans bascule heure d'été : pour décaler,
# change l'heure ci-dessous. Note : les workflows planifiés sont suspendus après 60 jours
# sans activité sur le dépôt — un commit occasionnel les réactive.

on:
  schedule:
    - cron: '7 4 * * *'     # tous les jours — ~06h07 Paris (été) / 05h07 (hiver)
  workflow_dispatch:         # déclenchement manuel depuis l'onglet Actions
    inputs:
      type:
        description: 'Type de rapport à générer manuellement'
        required: true
        default: daily
        type: choice
        options: [daily, weekly, monthly]

permissions:
  contents: write            # autorise le push des rapports générés

concurrency:
  group: veille-auto         # évite deux exécutions qui pousseraient en même temps
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install

      - name: Générer le(s) rapport(s)
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Déclenchement manuel : uniquement le type demandé.
            node src/index.js "${{ github.event.inputs.type }}"
          else
            # Déclenchement planifié : journalier chaque jour,
            # + hebdo le lundi (jour 1), + mensuel le 1er du mois.
            node src/index.js daily
            if [ "$(date -u +%u)" = "1" ]; then
              echo "Lundi → génération du rapport hebdomadaire"
              node src/index.js weekly
            fi
            if [ "$(date -u +%d)" = "01" ]; then
              echo "1er du mois → génération du rapport mensuel"
              node src/index.js monthly
            fi
          fi

      - name: Commiter les rapports
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add data/reports
          if git diff --cached --quiet; then
            echo "Aucun nouveau rapport à committer."
          else
            git commit -m "Veille auto — $(date -u +%Y-%m-%d)"
            git push
          fi
