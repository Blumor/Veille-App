<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veille App — Threat Intelligence</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <button
          class="menu-btn"
          id="btnMenu"
          aria-label="Ouvrir l'archive des rapports"
        >
          ☰
        </button>
        <div class="brand">
          <div class="logo">V</div>
          <div>
            <div class="name">VEILLE APP</div>
            <div class="sub">THREAT INTELLIGENCE NEWS</div>
          </div>
        </div>
        <div class="status">
          <span class="dot" id="statusDot"></span
          ><span id="statusTxt">OPÉRATIONNEL</span>
        </div>
        <div class="gen-status" id="genStatus">
          <span class="mini-spin"></span
          ><span id="genTxt">Recherche en cours…</span>
        </div>
        <div class="spacer"></div>
        <div class="actions">
          <button class="btn primary" id="btnDaily">
            <span class="b">▣</span><span class="lbl">Rapport du jour</span>
          </button>
          <button class="btn" id="btnWeekly">
            <span class="b">▤</span><span class="lbl">Rapport hebdo</span>
          </button>
          <button class="btn" id="btnMonthly">
            <span class="b">▦</span><span class="lbl">Rapport mensuel</span>
          </button>
        </div>
      </div>
      <div class="side" id="side"></div>
      <div class="main" id="main"></div>
    </div>
    <div class="side-overlay" id="sideOverlay"></div>
    <div class="toast" id="toast">
      <span class="ic">✓</span><span id="toastTxt"></span>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
